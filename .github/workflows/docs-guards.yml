name: Docs Guards

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  docs-guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Base-URL lint (fastcrw.com/api must not leak into engine docs)
        run: bash scripts/docs-guards.sh

      # The step above also covers Guard 2 (SKILL.md divergence), so a single
      # script invocation runs both checks. A failure in either guard fails
      # this job with a clear per-guard diagnostic.
