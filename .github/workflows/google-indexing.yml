name: Google Indexing Notify

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "scripts/build-docs-pages.mjs"

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          # Admin PAT so the doc-page-regen push bypasses branch protection
          # (the default GITHUB_TOKEN / bot cannot push to protected main).
          token: ${{ secrets.GH_DISPATCH_PAT }}

      - name: Collect changed docs files
        id: changed
        run: |
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            git show --pretty="" --name-only "${{ github.sha }}" -- docs/ > changed-files.txt
          else
            git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- docs/ > changed-files.txt
          fi

          if [ -s changed-files.txt ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.changed.outputs.has_changes == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install dependencies
        if: steps.changed.outputs.has_changes == 'true'
        run: npm install google-auth-library marked

      - name: Generate static doc pages
        if: steps.changed.outputs.has_changes == 'true'
        run: node scripts/build-docs-pages.mjs

      - name: Commit generated pages
        if: steps.changed.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/*/index.html docs/*/*/index.html docs/sitemap.xml
          git diff --staged --quiet || git commit -m "chore: regenerate static doc pages [skip ci]"
          git push || echo "::warning::doc-page regen push blocked (branch protection); regenerate manually"

      - name: Submit all URLs to Google Indexing API
        if: steps.changed.outputs.has_changes == 'true'
        env:
          GOOGLE_INDEXING_KEY: ${{ secrets.GOOGLE_INDEXING_KEY }}
        run: |
          echo "$GOOGLE_INDEXING_KEY" > /tmp/gcloud-key.json

          TOKEN=$(node -e "
            const { GoogleAuth } = require('google-auth-library');
            (async () => {
              const auth = new GoogleAuth({ keyFile: '/tmp/gcloud-key.json', scopes: ['https://www.googleapis.com/auth/indexing'] });
              const client = await auth.getClient();
              const token = await client.getAccessToken();
              console.log(token.token);
            })();
          ")

          # Build URL list: root + all slugs from site.config.js
          URLS=$(node -e "
            import('./docs/site.config.js').then(m => {
              const config = m.default;
              const slugs = config.sidebar.flatMap(s => s.children.map(c => c.slug));
              const urls = ['https://docs.fastcrw.com/', ...slugs.map(s => 'https://docs.fastcrw.com/' + s)];
              console.log(urls.join('\n'));
            });
          ")

          while IFS= read -r URL; do
            [ -z "$URL" ] && continue
            echo "Submitting: $URL"
            curl -s -X POST "https://indexing.googleapis.com/v3/urlNotifications:publish" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"url\": \"$URL\", \"type\": \"URL_UPDATED\"}" | head -c 200
            echo ""
          done <<< "$URLS"

          rm -f /tmp/gcloud-key.json
