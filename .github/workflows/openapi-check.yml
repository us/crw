name: OpenAPI Drift Check

# Builds the release binary and verifies that:
#   1. docs/openapi.json info.version matches [workspace.package].version.
#   2. GET /openapi.json served by the binary is byte-equal to docs/openapi.json
#      (after JSON normalisation), so the committed spec never drifts from the
#      spec the binary actually ships.
#
# Runs on every push/PR that touches the spec, the crate sources, or this
# workflow itself so drift is caught at feature-branch time, not post-merge.

on:
  push:
    branches: [main]
    paths:
      - "docs/openapi.json"
      - "crates/crw-server/openapi/**"
      - "crates/crw-server/src/**"
      - "crates/crw-core/src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/openapi-check.yml"
      - "scripts/check-openapi.sh"
  pull_request:
    branches: [main]
    paths:
      - "docs/openapi.json"
      - "crates/crw-server/openapi/**"
      - "crates/crw-server/src/**"
      - "crates/crw-core/src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/openapi-check.yml"
      - "scripts/check-openapi.sh"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  openapi-drift:
    name: OpenAPI spec drift check
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      # Was actions/cache with a bare `-cargo-` fallback restore-key, which pulled
      # in ci.yml's shared entry and saved the union back — the same unpruned
      # growth as there (375MB -> 730MB in 27h). The job id `openapi-drift` is
      # unique, so rust-cache's default job-scoped key is enough here.
      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build release binary
        run: cargo build --release -p crw-server

      - name: OpenAPI drift check
        env:
          CRW_SERVER_BIN: target/release/crw-server
        run: bash scripts/check-openapi.sh
