name: Preflight Publish

# PR-time guard: catches publish-breaking changes (workspace classification
# drift, version-surface mismatches, default-feature graph pulling unpublished
# crates, stale release-please-config jsonpath entries) BEFORE a tag is cut.

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/*/Cargo.toml"
      - "release-please-config.json"
      - ".release-please-manifest.json"
      - "scripts/release/release_manifest.toml"
      - "scripts/release/preflight.py"
      - "scripts/release/audit_release_please_config.py"
      - "scripts/release/test_guards.py"
      - "scripts/check-internal-dep-versions.sh"
      - "mcp/**/package.json"
      - "sdks/python/pyproject.toml"
      - "sdks/typescript/package.json"
      - "server.json"
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      # Cache-proof internal-pin invariant. Runs here too (not just ci.yml) so
      # that once the release-please bump PR triggers this workflow (via the
      # elevated token in release-please.yml) the full guard set gates the merge.
      - name: Internal dependency versions match workspace version
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/check-internal-dep-versions.sh

      - name: Run preflight (workspace + version surfaces)
        shell: bash
        run: |
          set -euo pipefail
          uv run python scripts/release/preflight.py

      - name: Audit release-please-config extra-files
        shell: bash
        run: |
          set -euo pipefail
          uv run python scripts/release/audit_release_please_config.py

      - name: Guard regression tests
        shell: bash
        run: |
          set -euo pipefail
          uv run python scripts/release/test_guards.py

      - name: Shellcheck release scripts
        shell: bash
        run: |
          set -euo pipefail
          shellcheck --severity=warning --source-path=scripts/release -x scripts/release/*.sh
