name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test
        run: cargo test --workspace

  publish-crates:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: "Tier 0: Publish crw-core, crw-pdf"
        run: |
          for crate in crw-core crw-pdf; do
            cargo publish -p "$crate" 2>&1 | tee /tmp/out.txt || grep -q "already uploaded" /tmp/out.txt
          done
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: "Tier 1: Publish crw-renderer, crw-extract"
        run: |
          for crate in crw-renderer crw-extract; do
            cargo publish -p "$crate" 2>&1 | tee /tmp/out.txt || grep -q "already uploaded" /tmp/out.txt
          done
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: "Tier 2: Publish crw-crawl"
        run: cargo publish -p crw-crawl 2>&1 | tee /tmp/out.txt || grep -q "already uploaded" /tmp/out.txt
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: "Tier 3: Publish crw-server, crw-cli"
        run: |
          for crate in crw-server crw-cli; do
            cargo publish -p "$crate" 2>&1 | tee /tmp/out.txt || grep -q "already uploaded" /tmp/out.txt
          done
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: "Tier 4: Publish crw-mcp (depends on crw-server)"
        run: cargo publish -p crw-mcp 2>&1 | tee /tmp/out.txt || grep -q "already uploaded" /tmp/out.txt
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-binaries:
    needs: check
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            platform: darwin
            arch_label: x64
          - target: aarch64-apple-darwin
            os: macos-latest
            platform: darwin
            arch_label: arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux
            arch_label: x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux
            arch_label: arm64
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            platform: win32
            arch_label: x64
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            platform: win32
            arch_label: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux ARM only)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release -p crw-mcp -p crw-cli -p crw-server --target ${{ matrix.target }}
          else
            cargo build --release -p crw-mcp -p crw-cli -p crw-server --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          for bin in crw crw-server crw-mcp; do
            tar czf "${bin}-${{ matrix.platform }}-${{ matrix.arch_label }}.tar.gz" \
              -C target/${{ matrix.target }}/release "$bin"
          done

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          foreach ($bin in @("crw", "crw-server", "crw-mcp")) {
            Compress-Archive -Path "target/${{ matrix.target }}/release/${bin}.exe" `
              -DestinationPath "${bin}-${{ matrix.platform }}-${{ matrix.arch_label }}.zip"
          }

      - name: Upload to release
        run: |
          for bin in crw crw-server crw-mcp; do
            if [ "${{ runner.os }}" = "Windows" ]; then
              ext="zip"
            else
              ext="tar.gz"
            fi
            gh release upload ${{ github.ref_name }} "${bin}-${{ matrix.platform }}-${{ matrix.arch_label }}.${ext}" --clobber
          done
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-pypi:
    needs: publish-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build and publish
        run: |
          pip install build twine
          cd python && python -m build
          twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  publish-npm:
    needs: publish-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Download all release assets
        run: |
          mkdir -p /tmp/assets
          gh release download ${{ github.ref_name }} -D /tmp/assets -p "crw-mcp-*"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare and publish platform packages
        run: |
          for dir in npm/crw-mcp-*/; do
            pkg=$(basename "$dir")
            case "$pkg" in
              crw-mcp-darwin-x64)   asset="crw-mcp-darwin-x64.tar.gz" ;;
              crw-mcp-darwin-arm64) asset="crw-mcp-darwin-arm64.tar.gz" ;;
              crw-mcp-linux-x64)   asset="crw-mcp-linux-x64.tar.gz" ;;
              crw-mcp-linux-arm64) asset="crw-mcp-linux-arm64.tar.gz" ;;
              crw-mcp-win32-x64)   asset="crw-mcp-win32-x64.zip" ;;
              crw-mcp-win32-arm64) asset="crw-mcp-win32-arm64.zip" ;;
              *) continue ;;
            esac
            if [[ "$asset" == *.zip ]]; then
              unzip -o "/tmp/assets/$asset" -d "$dir"
            else
              tar xzf "/tmp/assets/$asset" -C "$dir"
            fi
            cd "$dir" && npm publish --access public || true && cd -
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        run: cd npm/crw-mcp && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-docker:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-mcp-registry:
    needs: publish-docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Install mcp-publisher
        run: |
          curl -fsSL -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/

      - name: Authenticate with MCP Registry
        run: mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: mcp-publisher publish

  update-apt:
    needs: publish-binaries
    runs-on: ubuntu-latest
    steps:
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Trigger APT repo update
        run: |
          gh api repos/us/apt-crw/dispatches \
            -f event_type=crw-release \
            -f "client_payload[version]=${{ steps.version.outputs.version }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    needs: publish-binaries
    runs-on: ubuntu-latest
    steps:
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Trigger homebrew tap update
        run: |
          gh api repos/us/homebrew-crw/dispatches \
            -f event_type=crw-release \
            -f "client_payload[version]=${{ steps.version.outputs.version }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
