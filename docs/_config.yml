title: CRW
description: "Lightweight, Firecrawl-compatible web scraper. Single binary, ~3MB RAM, optional JS rendering."
url: "https://us.github.io"
baseurl: "/crw"

remote_theme: just-the-docs/just-the-docs@v0.10.0

color_scheme: dark

permalink: pretty

aux_links:
  "GitHub":
    - "https://github.com/us/crw"

aux_links_new_tab: true

nav_sort: case_insensitive

heading_anchors: true

search_enabled: true
search.heading_level: 3

back_to_top: true
back_to_top_text: "Back to top"

footer_content: 'CRW is released under the <a href="https://github.com/us/crw/blob/main/LICENSE">AGPL-3.0 License</a>.'

last_edit_timestamp: true
last_edit_time_format: "%b %e %Y at %I:%M %p"

gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/us/crw"
gh_edit_branch: "main"
gh_edit_source: docs
gh_edit_view_mode: "tree"

callouts:
  warning:
    title: Warning
    color: yellow
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
