          <h1>CRW — Open-Source Firecrawl Alternative</h1>
          <p>CRW is a lightweight, self-hosted web scraper and web crawler written in Rust. A fast, open-source alternative to Firecrawl and Crawl4AI designed for LLM extraction, RAG pipelines, and AI agents.</p>
          <h2>Why CRW over Firecrawl or Crawl4AI?</h2>
          <ul>
            <li><strong>92% coverage</strong> on 1,000 real-world URLs (vs Firecrawl 77.2%)</li>
            <li><strong>5.5x faster</strong> — 833ms avg latency vs Firecrawl's 4,600ms</li>
            <li><strong>75x less RAM</strong> — 6.6 MB idle vs Firecrawl's 500 MB+</li>
            <li><strong>Single binary</strong> — no Node.js, no Redis, no PostgreSQL, no Docker required</li>
            <li><strong>Firecrawl-compatible API</strong> — same endpoint family and familiar request/response shape</li>
            <li><strong>Built-in MCP server</strong> — works with Claude Code, Claude Desktop, Cursor, Windsurf, Cline, Continue.dev</li>
            <li><strong>LLM structured extraction</strong> — Anthropic tool_use + OpenAI function calling</li>
            <li><strong>JS rendering</strong> — auto-detect SPAs, render via LightPanda, Playwright, or Chrome</li>
          </ul>
          <h2>Quick Start</h2>
          <p>Install from crates.io: <code>cargo install crw-server</code>, then run <code>crw-server</code>. Scrape any URL with a single curl command to the Firecrawl-compatible REST API at localhost:3000.</p>
          <h2>Features</h2>
          <ul>
            <li>Firecrawl-compatible REST API — /v1/scrape, /v1/crawl, /v1/map</li>
            <li>6 output formats — Markdown, HTML, cleaned HTML, raw HTML, plain text, links, JSON</li>
            <li>MCP server — stdio + HTTP transport for AI coding assistants</li>
            <li>BFS crawler — async crawl with rate limiting, robots.txt, sitemap support</li>
            <li>CSS selector &amp; XPath extraction</li>
            <li>Chunking with BM25 &amp; cosine similarity for RAG pipelines</li>
            <li>Stealth mode — browser-like User-Agent rotation</li>
            <li>SSRF protection, constant-time auth</li>
            <li>Docker ready with LightPanda sidecar</li>
          </ul>
          <h2>Benchmark Comparison</h2>
          <p>Tested on Firecrawl's scrape-content-dataset-v1 (1,000 URLs). CRW: 92% coverage, 833ms latency, 6.6 MB RAM, $0 cost. Firecrawl: 77.2% coverage, 4,600ms latency, 500 MB+ RAM, $0.83-5.33/1K. Crawl4AI: 11.3% noise ratio, 480ms static latency, 72% anti-bot. Spider: 99.9% coverage, 45ms static latency, 4.2% noise.</p>
          <p>CRW is open-source under AGPL-3.0. Managed cloud available at fastcrw.com.</p>
