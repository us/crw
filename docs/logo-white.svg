<svg width="240" height="40" viewBox="0 0 240 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Minimal Bracket [Fast] -->
  <text x="0" y="28" font-family="Arial, sans-serif" font-weight="100" font-size="32" fill="currentColor" opacity="0.3">[</text>
  <text x="12" y="27" font-family="Arial, sans-serif" font-weight="900" font-size="14" letter-spacing="0.2em" fill="currentColor" text-transform="uppercase">FAST</text>
  <text x="62" y="28" font-family="Arial, sans-serif" font-weight="100" font-size="32" fill="currentColor" opacity="0.3">]</text>
  
  <!-- CRW Blocks -->
  <rect x="85" y="5" width="30" height="30" fill="currentColor"/>
  <text x="93" y="27" font-family="Arial, sans-serif" font-weight="900" font-size="18" fill="context-fill" style="fill: Canvas; color-interpolation-filters: sRGB;">C</text>
  
  <rect x="118" y="5" width="30" height="30" fill="currentColor"/>
  <text x="126" y="27" font-family="Arial, sans-serif" font-weight="900" font-size="18" fill="context-fill" style="fill: Canvas;">R</text>
  
  <rect x="151" y="5" width="30" height="30" fill="currentColor"/>
  <text x="158" y="27" font-family="Arial, sans-serif" font-weight="900" font-size="18" fill="context-fill" style="fill: Canvas;">W</text>
  
  <style>
    text { font-family: sans-serif; }
    .canvas-text { fill: white; }
    [data-theme="dark"] .canvas-text { fill: black; }
  </style>
</svg>