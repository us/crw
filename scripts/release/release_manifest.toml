# Single source of truth for the publish pipeline.
# Tier order = topological dependency order. Within a tier, crates are
# independent and may be published in parallel (the driver script publishes
# them sequentially today, but tier boundaries enforce ordering).
#
# Edits here must stay in sync with each crate's Cargo.toml `publish` field
# (preflight enforces this).

[release]
version_source = "Cargo.toml"  # workspace.package.version

[[tiers]]
order = 0
crates = ["crw-mcp-proto"]

[[tiers]]
order = 1
crates = ["crw-core"]

# Within a tier crates MUST be independent of each other (the driver waits for
# crates.io propagation only at tier boundaries, not between same-tier crates).
# crw-renderer depends on crw-extract, so it cannot share tier 2 with it — that
# ordering bug skipped the crates.io publish from crw-renderer onward (a crate
# tried to resolve a sibling that wasn't on the index yet). renderer gets its
# own tier after extract.
[[tiers]]
order = 2
crates = ["crw-extract", "crw-search", "crw-diff"]

[[tiers]]
# crw-renderer depends on crw-extract (tier 2).
order = 3
crates = ["crw-renderer"]

[[tiers]]
# crw-crawl depends on crw-renderer, crw-diff, crw-extract.
# crw-browse depends only on crw-core + crw-renderer and is independent of
# crw-crawl, so it shares this tier (required by crw-cli's `browse` feature).
order = 4
crates = ["crw-crawl", "crw-browse"]

[[tiers]]
order = 6
crates = ["crw-server"]

[[tiers]]
order = 7
crates = ["crw-mcp"]

[[tiers]]
# crw-cli (the `crw` binary) depends on crw-server (tier 6) + crw-browse
# (tier 4), so it publishes last. Distributed both via crates.io
# (`cargo install crw-cli`) and prebuilt release binaries (install.sh).
order = 8
crates = ["crw-cli"]

[unpublished]
# Every workspace crate now publishes to crates.io. Keep this key (preflight
# asserts each crate is either tiered or listed here — no silent third state).
crates = []

[npm]
main_package = "crw-mcp"
platform_packages = [
  "crw-mcp-darwin-x64",
  "crw-mcp-darwin-arm64",
  "crw-mcp-linux-x64",
  "crw-mcp-linux-arm64",
  "crw-mcp-win32-x64",
  "crw-mcp-win32-arm64",
]

[pypi]
package = "crw"

[docker]
image = "ghcr.io/us/crw"
